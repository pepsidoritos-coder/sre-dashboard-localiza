name: 🚀 CI/CD — SRE Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: localiza-app
  EKS_CLUSTER: localiza-prod
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --------------------------------------------------------
  # JOB 1: Build & Push Docker image to ECR
  # --------------------------------------------------------
  build:
    name: 🐳 Build & Push ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # --------------------------------------------------------
  # JOB 2: Terraform Plan (sempre) / Apply (só main)
  # --------------------------------------------------------
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color

  # --------------------------------------------------------
  # JOB 3: Deploy para EKS
  # --------------------------------------------------------
  deploy:
    name: ☸️ Deploy EKS
    runs-on: ubuntu-latest
    needs: [build, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Update image in deployment
        run: |
          kubectl set image deployment/localiza-app \
            app=${{ needs.build.outputs.image }} \
            --namespace=default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/localiza-app \
            --namespace=default \
            --timeout=300s

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Verify pods
        run: kubectl get pods -n default -l app=localiza-app

      - name: Get ALB endpoint
        run: |
          echo "🌐 ALB Endpoint:"
          kubectl get ingress localiza-app-ingress -n default \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
