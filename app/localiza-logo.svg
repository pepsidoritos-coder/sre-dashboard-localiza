<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 56">
  <!--
    Localiza Official Logo — Precision SVG Recreation
    White L-icon + lime-green leaf + white wordmark
    Transparent background — for use on dark navbar
  -->

  <!-- ── L-ICON ─────────────────────────────────────────
       Pushed down 10px so the leaf rising above has room.
       Icon occupies viewBox (2,10) → (42,50), 40×40 units.
       Path goes CLOCKWISE from top-left corner.
       Vertical bar:  icon x 0–15, full height 0–40
       Horizontal bar: icon x 0–40, y 24–40
       Corner radius: outer = 6, inner-concave = 6
  ───────────────────────────────────────────────────── -->
  <g transform="translate(2,10)">
    <path fill="#FFFFFF" d="
      M 6 0
      L 9 0
      Q 15 0 15 6
      L 15 18
      Q 15 24 21 24
      L 34 24
      Q 40 24 40 30
      L 40 34
      Q 40 40 34 40
      L 6 40
      Q 0 40 0 34
      L 0 6
      Q 0 0 6 0
      Z
    "/>
  </g>

  <!-- ── LEAF ──────────────────────────────────────────
       Lime green leaf at the top of the vertical bar,
       positioned in the upper-right notch area.
       Two ellipses: outer lime + inner white cutout
       to create the split two-lobe Localiza leaf.
  ───────────────────────────────────────────────────── -->
  <!-- Outer lime leaf -->
  <ellipse
    cx="20" cy="8"
    rx="7" ry="10.5"
    fill="#5DC000"
    transform="rotate(-22, 20, 8)"
  />
  <!-- White inner cutout — creates the classic Localiza split-leaf look -->
  <ellipse
    cx="17.5" cy="11"
    rx="4.2" ry="6.5"
    fill="#FFFFFF"
    transform="rotate(-22, 17.5, 11)"
  />

  <!-- ── WORDMARK ───────────────────────────────────────
       "Localiza" — Inter 700, white, size 28
       x=58 gives comfortable spacing after the 40px icon
       y=38 vertically centers in the 56-unit viewBox
  ───────────────────────────────────────────────────── -->
  <text
    x="57" y="38"
    font-family="Inter, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="26"
    fill="#FFFFFF"
    letter-spacing="-0.3"
  >Localiza</text>
</svg>
