apiVersion: apps/v1
kind: Deployment
metadata:
  name: localiza-app
  namespace: default
  labels:
    app: localiza-app
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: localiza-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: localiza-app
        version: "1.0"
    spec:
      containers:
        - name: app
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/localiza-app:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: localiza-app
