apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: general
spec:
  template:
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot", "on-demand"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values: ["c5.xlarge", "c5.2xlarge", "m5.xlarge", "m5.2xlarge", "c5a.xlarge", "c5a.2xlarge"]
  limits:
    cpu: "100"
    memory: 200Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  role: "<NODE_IAM_ROLE_NAME>"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "localiza-prod"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "localiza-prod"
  tags:
    ManagedBy: karpenter
    Project: localiza
